<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clientes 360</title>
    
    <!-- Configuración para Pantalla de Inicio en iOS (PWA) y Favicon -->
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778020925/Dise%C3%B1o_sin_t%C3%ADtulo_1_pvnyid.png">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778020925/Dise%C3%B1o_sin_t%C3%ADtulo_1_pvnyid.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Clientes 360">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Utilidades iOS */
        .ios-bg { background-color: #F2F2F7; }
        .ios-card { background-color: #FFFFFF; }
        .ios-blue { color: #007AFF; }
        .bg-ios-blue { background-color: #007AFF; }
        .glass-nav { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Animaciones iOS y Modales Responsivos */
        .slide-up-modal {
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease;
        }

        @media (max-width: 767px) {
            .slide-up-modal { transform: translateY(100%); }
            .slide-up-modal.active { transform: translateY(0); }
        }

        @media (min-width: 768px) {
            .slide-up-modal {
                transform: translate(-50%, -45%) scale(0.95);
                opacity: 0;
                left: 50%;
                top: 50%;
                bottom: auto;
                right: auto;
            }
            .slide-up-modal.active {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Ocultar scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900 bg-black md:bg-gray-100 h-screen w-screen overflow-hidden flex justify-center items-center">

    <!-- Contenedor principal adaptable -->
    <div id="app-container" class="w-full h-full md:max-w-6xl ios-bg relative overflow-hidden md:shadow-2xl md:rounded-3xl md:h-[90vh] md:border md:border-gray-200 flex flex-col md:flex-row">
        
        <!-- ========================================== -->
        <!-- PANTALLA DE AUTENTICACIÓN (Bloqueo)          -->
        <!-- ========================================== -->
        <div id="auth-screen" class="absolute inset-0 ios-bg z-50 flex flex-col items-center justify-center px-6 transition-opacity duration-300">
            <div class="w-full max-w-sm mx-auto flex flex-col items-center">
                <img src="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778020925/Dise%C3%B1o_sin_t%C3%ADtulo_1_pvnyid.png" alt="Clientes 360 Logo" class="w-24 h-24 md:w-32 md:h-32 rounded-3xl mb-6 shadow-xl object-cover">
                <h1 id="auth-title" class="text-2xl md:text-3xl font-bold mb-2 text-center">Clientes 360</h1>
                <p id="auth-subtitle" class="text-slate-500 mb-8 text-center text-sm md:text-base">Ingresa tu contraseña para acceder</p>
                
                <div class="w-full">
                    <input type="password" id="auth-password" placeholder="Contraseña" class="w-full ios-card rounded-xl px-4 py-3 md:py-4 text-center text-lg shadow-sm border border-slate-200 focus:outline-none focus:border-[#007AFF] focus:ring-1 focus:ring-[#007AFF] transition-all mb-4">
                    <button onclick="handleAuth()" id="auth-btn" class="w-full bg-ios-blue text-white font-semibold rounded-xl py-3 md:py-4 shadow-md hover:bg-blue-600 transition-colors active:scale-95 text-lg">Desbloquear</button>
                </div>
                <p id="auth-error" class="text-red-500 text-sm mt-4 hidden fade-in">Contraseña incorrecta</p>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- NAVEGACIÓN (Bottom en Móvil / Sidebar en PC) -->
        <!-- ========================================== -->
        <nav id="main-nav" class="absolute md:relative bottom-0 w-full md:w-64 glass-nav md:bg-white md:backdrop-filter-none border-t md:border-t-0 md:border-r border-gray-200/60 pb-safe pt-2 md:pt-10 px-6 md:px-4 flex md:flex-col justify-around md:justify-start items-center md:items-start z-30 pb-4 md:space-y-2 hidden">
            <!-- Header Sidebar (Solo visible en Desktop) -->
            <div class="hidden md:block mb-8 px-4 w-full text-center">
                <img src="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778020925/Dise%C3%B1o_sin_t%C3%ADtulo_1_pvnyid.png" alt="Clientes 360 Logo" class="w-16 h-16 mx-auto rounded-2xl shadow-md mb-3 object-cover">
                <h2 class="font-bold text-xl tracking-tight">Clientes 360</h2>
            </div>

            <!-- Botones Navegación -->
            <button onclick="switchTab('home')" class="flex flex-col md:flex-row items-center md:px-4 md:py-3 w-auto md:w-full rounded-xl text-[#007AFF] md:bg-blue-50 nav-btn transition-colors" data-tab="home">
                <svg class="w-6 h-6 mb-1 md:mb-0 md:mr-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L4 9v12h5v-7h6v7h5V9z"/></svg>
                <span class="text-[10px] md:text-sm font-semibold">Clientes</span>
            </button>
            <button onclick="switchTab('settings')" class="flex flex-col md:flex-row items-center md:px-4 md:py-3 w-auto md:w-full rounded-xl text-gray-400 hover:bg-gray-100 transition-colors nav-btn" data-tab="settings">
                <svg class="w-6 h-6 mb-1 md:mb-0 md:mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="text-[10px] md:text-sm font-medium">Ajustes</span>
            </button>
        </nav>

        <!-- ========================================== -->
        <!-- APLICACIÓN PRINCIPAL (Contenido)             -->
        <!-- ========================================== -->
        <div id="main-app" class="flex-1 flex flex-col hidden h-full relative">
            
            <div class="flex-1 overflow-y-auto no-scrollbar pb-24 md:pb-12 relative w-full px-4 md:px-8" id="scroll-container">
                
                <!-- PESTAÑA: CLIENTES (HOME) -->
                <div id="tab-home" class="tab-content pt-12 md:pt-16 max-w-5xl mx-auto">
                    <div class="flex justify-between items-end mb-6">
                        <h1 class="text-4xl md:text-5xl font-bold tracking-tight">Clientes</h1>
                        <button onclick="openClientModal()" class="w-9 h-9 md:w-10 md:h-10 bg-gray-200 md:bg-white md:shadow-sm rounded-full flex items-center justify-center text-[#007AFF] hover:bg-gray-300 md:hover:bg-gray-50 active:scale-90 transition-transform">
                            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </div>

                    <!-- Buscador iOS Style Responsivo -->
                    <div class="relative mb-8 w-full md:max-w-md">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="searchInput" onkeyup="renderClients()" placeholder="Buscar cliente..." class="w-full bg-gray-200/80 md:bg-white md:shadow-sm rounded-xl pl-10 pr-4 py-2.5 md:py-3 text-sm md:text-base focus:outline-none focus:ring-2 focus:ring-[#007AFF]/50 transition-all placeholder-gray-500">
                    </div>

                    <!-- Lista de Clientes (Grid Responsivo) -->
                    <div id="clientsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                        <!-- Inyectado vía JS -->
                    </div>

                    <!-- Estado Vacío -->
                    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center w-full">
                        <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center text-gray-400 mb-4 shadow-inner">
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <p class="text-gray-500 text-base">No hay clientes registrados aún.</p>
                    </div>
                </div>

                <!-- PESTAÑA: AJUSTES -->
                <div id="tab-settings" class="tab-content hidden pt-12 md:pt-16 max-w-2xl mx-auto">
                    <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-8">Ajustes</h1>
                    
                    <div class="ios-card rounded-2xl overflow-hidden shadow-sm md:shadow-md border md:border-gray-100">
                        <div class="px-5 py-4 border-b border-gray-100 flex items-center bg-gray-50/50">
                            <div class="w-10 h-10 rounded-xl bg-blue-100 text-[#007AFF] flex items-center justify-center mr-4 shadow-sm">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </div>
                            <div class="flex-1">
                                <p class="text-base font-semibold">Seguridad de la Cuenta</p>
                            </div>
                        </div>
                        <div class="px-5 py-6">
                            <h3 class="text-sm font-semibold mb-4 text-gray-500 uppercase tracking-wider">Cambiar Contraseña</h3>
                            <input type="password" id="old-pwd" placeholder="Contraseña Actual" class="w-full bg-gray-100 rounded-xl px-4 py-3 text-sm md:text-base mb-3 focus:outline-none focus:ring-2 focus:ring-[#007AFF]/50 transition-all">
                            <input type="password" id="new-pwd" placeholder="Nueva Contraseña" class="w-full bg-gray-100 rounded-xl px-4 py-3 text-sm md:text-base mb-5 focus:outline-none focus:ring-2 focus:ring-[#007AFF]/50 transition-all">
                            <button onclick="changePassword()" class="w-full bg-ios-blue text-white text-base font-semibold rounded-xl py-3 shadow-md hover:bg-blue-600 active:scale-95 transition-all">Actualizar Contraseña</button>
                            <p id="pwd-msg" class="text-sm mt-3 text-center hidden"></p>
                        </div>
                    </div>
                    
                    <div class="mt-10 text-center">
                        <button onclick="lockApp()" class="text-red-500 font-semibold text-base md:text-lg active:opacity-50 transition-opacity bg-red-50 px-6 py-3 rounded-xl hover:bg-red-100">Cerrar Sesión / Bloquear</button>
                        <p class="text-sm text-gray-400 mt-6">Clientes 360 v3.0 Responsivo</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- ========================================== -->
        <!-- MODAL: CREAR/EDITAR CLIENTE                -->
        <!-- ========================================== -->
        <div id="modal-overlay" class="absolute inset-0 bg-black/50 md:bg-black/40 z-40 hidden transition-opacity opacity-0 backdrop-blur-sm" onclick="closeClientModal()"></div>
        <div id="clientModal" class="absolute inset-x-0 bottom-0 md:inset-auto md:w-full md:max-w-lg ios-bg rounded-t-3xl md:rounded-2xl shadow-2xl z-50 h-[85%] md:h-auto md:max-h-[85vh] slide-up-modal flex flex-col">
            
            <div class="flex justify-between items-center px-4 md:px-6 py-4 border-b border-gray-200 glass-nav md:bg-white md:backdrop-filter-none rounded-t-3xl md:rounded-t-2xl">
                <button onclick="closeClientModal()" class="text-[#007AFF] text-sm md:text-base hover:opacity-80 transition-opacity">Cancelar</button>
                <h3 class="font-semibold text-base md:text-lg" id="modal-title">Nuevo Cliente</h3>
                <button onclick="saveClient()" class="text-[#007AFF] text-sm md:text-base font-semibold hover:opacity-80 transition-opacity">Guardar</button>
            </div>
            
            <div class="flex-1 overflow-y-auto px-4 md:px-6 py-6 space-y-6 bg-[#F2F2F7]">
                <input type="hidden" id="clientId">
                
                <div class="ios-card rounded-xl px-4 py-2 border border-gray-100 shadow-sm">
                    <input type="text" id="clientName" placeholder="Nombre de la empresa / cliente" class="w-full py-2 md:py-3 text-sm md:text-base focus:outline-none bg-transparent">
                </div>

                <div class="ios-card rounded-xl border border-gray-100 shadow-sm divide-y divide-gray-100">
                    <div class="px-4 py-3 md:py-4 flex justify-between items-center hover:bg-gray-50 transition-colors rounded-t-xl">
                        <span class="text-sm md:text-base font-medium">Estado</span>
                        <select id="clientStatus" class="text-sm md:text-base text-gray-500 bg-transparent focus:outline-none text-right dir-rtl cursor-pointer">
                            <option value="Lead">Lead</option>
                            <option value="En Progreso">En Progreso</option>
                            <option value="Pausado">Pausado</option>
                            <option value="Completado">Completado</option>
                        </select>
                    </div>
                    <div class="px-4 py-3 md:py-4 flex justify-between items-center hover:bg-gray-50 transition-colors">
                        <span class="text-sm md:text-base font-medium">Suscripción</span>
                        <select id="clientSub" onchange="toggleDateInput()" class="text-sm md:text-base text-gray-500 bg-transparent focus:outline-none text-right dir-rtl cursor-pointer">
                            <option value="Ninguna">Ninguna / Único</option>
                            <option value="Mensual">Mensual</option>
                            <option value="Anual">Anual</option>
                            <option value="Mantenimiento">Mantenimiento</option>
                        </select>
                    </div>
                    <div id="expirationContainer" class="px-4 py-3 md:py-4 flex justify-between items-center hover:bg-gray-50 transition-colors rounded-b-xl hidden">
                        <span class="text-sm md:text-base font-medium">Vence el</span>
                        <input type="date" id="clientExpDate" class="text-sm md:text-base text-[#007AFF] bg-transparent focus:outline-none cursor-pointer">
                    </div>
                </div>

                <div class="ios-card rounded-xl px-4 py-3 border border-gray-100 shadow-sm">
                    <textarea id="clientNotes" rows="5" placeholder="Notas, requerimientos, accesos..." class="w-full text-sm md:text-base focus:outline-none resize-none bg-transparent"></textarea>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- MODAL: VER NOTAS COMPLETAS                 -->
        <!-- ========================================== -->
        <div id="notesModal" class="absolute inset-x-0 bottom-0 md:inset-auto md:w-full md:max-w-md bg-white rounded-t-3xl md:rounded-2xl shadow-2xl z-50 h-[60%] md:h-auto md:max-h-[70vh] slide-up-modal flex flex-col">
            <div class="flex justify-between items-center px-4 md:px-6 py-4 border-b border-gray-100 bg-gray-50 md:rounded-t-2xl">
                <span class="w-12"></span> <!-- Espaciador -->
                <h3 class="font-semibold text-base" id="notesModalTitle">Notas</h3>
                <button onclick="closeNotesModal()" class="w-12 text-right text-[#007AFF] font-semibold text-base hover:opacity-80 transition-opacity">OK</button>
            </div>
            <div class="flex-1 overflow-y-auto px-6 py-6 bg-white md:rounded-b-2xl">
                <p class="text-sm md:text-base text-gray-700 whitespace-pre-wrap leading-relaxed" id="notesModalContent"></p>
            </div>
        </div>

    </div>

    <!-- Script de Lógica Principal -->
    <script>
        // --- 1. SEGURIDAD Y CRIPTOGRAFÍA ---
        async function hashPassword(password) {
            const msgUint8 = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // --- 2. ANTI-XSS ---
        const escapeHTML = (str) => {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        };

        // --- 3. ESTADO Y ALMACENAMIENTO ---
        let clients = JSON.parse(localStorage.getItem('clientes360_clients')) || [];
        
        // --- 4. SISTEMA DE AUTENTICACIÓN ---
        async function checkAuthState() {
            const savedHash = localStorage.getItem('clientes360_auth');
            const title = document.getElementById('auth-title');
            const sub = document.getElementById('auth-subtitle');
            const btn = document.getElementById('auth-btn');

            if (!savedHash) {
                title.textContent = "Bienvenido";
                sub.textContent = "Crea una contraseña maestra para tu CRM";
                btn.textContent = "Crear y Entrar";
                btn.dataset.mode = "setup";
            } else {
                title.textContent = "Clientes 360";
                sub.textContent = "Ingresa tu contraseña para acceder";
                btn.textContent = "Desbloquear";
                btn.dataset.mode = "login";
            }
        }

        async function handleAuth() {
            const input = document.getElementById('auth-password');
            const errorMsg = document.getElementById('auth-error');
            const btn = document.getElementById('auth-btn');
            const pwd = input.value.trim();

            if (!pwd) return;

            const hashedInput = await hashPassword(pwd);

            if (btn.dataset.mode === "setup") {
                localStorage.setItem('clientes360_auth', hashedInput);
                unlockApp();
            } else {
                const savedHash = localStorage.getItem('clientes360_auth');
                if (hashedInput === savedHash) {
                    unlockApp();
                } else {
                    errorMsg.classList.remove('hidden');
                    input.classList.add('border-red-500', 'bg-red-50');
                    setTimeout(() => {
                        input.classList.remove('border-red-500', 'bg-red-50');
                        errorMsg.classList.add('hidden');
                    }, 2000);
                }
            }
            input.value = '';
        }

        function unlockApp() {
            document.getElementById('auth-screen').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
                renderClients();
            }, 300);
        }

        function lockApp() {
            document.getElementById('auth-screen').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('main-nav').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('opacity-0', 'pointer-events-none');
                checkAuthState();
            }, 50);
        }

        async function changePassword() {
            const oldInput = document.getElementById('old-pwd').value;
            const newInput = document.getElementById('new-pwd').value;
            const msg = document.getElementById('pwd-msg');
            
            if (!oldInput || !newInput) {
                showMessage(msg, "Llena ambos campos", "text-red-500");
                return;
            }

            const oldHash = await hashPassword(oldInput);
            const savedHash = localStorage.getItem('clientes360_auth');

            if (oldHash === savedHash) {
                const newHash = await hashPassword(newInput);
                localStorage.setItem('clientes360_auth', newHash);
                showMessage(msg, "¡Contraseña actualizada exitosamente!", "text-green-600");
                document.getElementById('old-pwd').value = '';
                document.getElementById('new-pwd').value = '';
            } else {
                showMessage(msg, "Contraseña actual incorrecta", "text-red-500");
            }
        }

        function showMessage(element, text, colorClass) {
            element.textContent = text;
            element.className = `text-sm mt-3 text-center font-medium ${colorClass} fade-in`;
            element.classList.remove('hidden');
            setTimeout(() => element.classList.add('hidden'), 3000);
        }

        // --- 5. NAVEGACIÓN TIPO iOS RESPONSIVA ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.tab === tabId) {
                    btn.classList.remove('text-gray-400', 'hover:bg-gray-100');
                    btn.classList.add('text-[#007AFF]', 'md:bg-blue-50');
                    btn.querySelector('span').classList.replace('font-medium', 'font-semibold');
                    if(tabId==='home') btn.querySelector('svg').innerHTML = '<path d="M12 3L4 9v12h5v-7h6v7h5V9z"/>';
                } else {
                    btn.classList.remove('text-[#007AFF]', 'md:bg-blue-50');
                    btn.classList.add('text-gray-400', 'hover:bg-gray-100');
                    btn.querySelector('span').classList.replace('font-semibold', 'font-medium');
                    if(btn.dataset.tab==='home') btn.querySelector('svg').innerHTML = '<path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" points="9 22 9 12 15 12 15 22"></polyline>';
                }
            });
        }

        // --- 6. LOGICA DE CLIENTES ---
        const generateId = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);

        function saveClientsToStorage() {
            localStorage.setItem('clientes360_clients', JSON.stringify(clients));
        }

        function toggleDateInput() {
            const subType = document.getElementById('clientSub').value;
            const container = document.getElementById('expirationContainer');
            subType !== 'Ninguna' ? container.classList.remove('hidden') : container.classList.add('hidden');
        }

        function openClientModal(id = null) {
            document.getElementById('clientName').value = '';
            document.getElementById('clientStatus').value = 'Lead';
            document.getElementById('clientSub').value = 'Ninguna';
            document.getElementById('clientExpDate').value = '';
            document.getElementById('clientNotes').value = '';
            document.getElementById('clientId').value = '';
            document.getElementById('modal-title').textContent = 'Nuevo Cliente';

            if (id) {
                const c = clients.find(x => x.id === id);
                if (c) {
                    document.getElementById('modal-title').textContent = 'Editar Cliente';
                    document.getElementById('clientId').value = c.id;
                    document.getElementById('clientName').value = c.name;
                    document.getElementById('clientStatus').value = c.status;
                    document.getElementById('clientSub').value = c.subscription;
                    document.getElementById('clientNotes').value = c.notes;
                    if (c.subscription !== 'Ninguna') document.getElementById('clientExpDate').value = c.expDate;
                }
            }
            
            toggleDateInput();
            document.getElementById('modal-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-overlay').classList.remove('opacity-0');
                document.getElementById('clientModal').classList.add('active');
            }, 10);
        }

        function closeClientModal() {
            document.getElementById('clientModal').classList.remove('active');
            document.getElementById('modal-overlay').classList.add('opacity-0');
            setTimeout(() => document.getElementById('modal-overlay').classList.add('hidden'), 300);
        }

        function saveClient() {
            const name = document.getElementById('clientName').value.trim();
            if (!name) { alert('El nombre es requerido'); return; }

            const id = document.getElementById('clientId').value;
            const newClient = {
                id: id || generateId(),
                name: name,
                status: document.getElementById('clientStatus').value,
                subscription: document.getElementById('clientSub').value,
                expDate: document.getElementById('clientExpDate').value,
                notes: document.getElementById('clientNotes').value
            };

            if (id) {
                const idx = clients.findIndex(c => c.id === id);
                if (idx > -1) clients[idx] = newClient;
            } else {
                clients.unshift(newClient);
            }

            saveClientsToStorage();
            closeClientModal();
            renderClients();
        }

        function deleteClient(id) {
            if (confirm('¿Eliminar cliente permanentemente?')) {
                clients = clients.filter(c => c.id !== id);
                saveClientsToStorage();
                renderClients();
            }
        }

        function openNotesModal(id) {
            const c = clients.find(x => x.id === id);
            if (c) {
                document.getElementById('notesModalTitle').textContent = `Notas: ${c.name}`;
                document.getElementById('notesModalContent').textContent = c.notes || 'Sin notas adicionales.';
                document.getElementById('modal-overlay').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('modal-overlay').classList.remove('opacity-0');
                    document.getElementById('notesModal').classList.add('active');
                }, 10);
            }
        }

        function closeNotesModal() {
            document.getElementById('notesModal').classList.remove('active');
            document.getElementById('modal-overlay').classList.add('opacity-0');
            setTimeout(() => document.getElementById('modal-overlay').classList.add('hidden'), 300);
        }

        // --- 7. RENDERIZADO DE LA INTERFAZ ---
        function getStatusColor(status) {
            return {
                'Lead': 'bg-blue-100 text-blue-700 border-blue-200',
                'En Progreso': 'bg-amber-100 text-amber-700 border-amber-200',
                'Pausado': 'bg-gray-100 text-gray-700 border-gray-200',
                'Completado': 'bg-emerald-100 text-emerald-700 border-emerald-200'
            }[status] || 'bg-gray-100 text-gray-700 border-gray-200';
        }

        function renderClients() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('clientsList');
            const empty = document.getElementById('emptyState');
            
            list.innerHTML = '';
            
            const filtered = clients.filter(c => c.name.toLowerCase().includes(query));

            if (filtered.length === 0) {
                empty.classList.remove('hidden');
                list.classList.add('hidden');
            } else {
                empty.classList.add('hidden');
                list.classList.remove('hidden');
                
                filtered.forEach(c => {
                    const safeName = escapeHTML(c.name);
                    const safeNotes = escapeHTML(c.notes);
                    const isSub = c.subscription !== 'Ninguna';
                    
                    let subText = c.subscription;
                    let expAlert = '';
                    
                    if (isSub && c.expDate) {
                        const days = Math.ceil((new Date(c.expDate) - new Date().setHours(0,0,0,0)) / (1000 * 60 * 60 * 24));
                        if (days < 0) expAlert = `<span class="text-xs text-red-500 font-bold ml-2">(Vencida)</span>`;
                        else if (days <= 5) expAlert = `<span class="text-xs text-orange-500 font-bold ml-2">(Vence en ${days}d)</span>`;
                    }

                    const card = `
                        <div class="ios-card rounded-2xl p-5 shadow-sm border border-gray-100 relative hover:shadow-md transition-shadow flex flex-col justify-between group">
                            <div>
                                <div class="flex justify-between items-start mb-1">
                                    <h3 class="font-bold text-lg md:text-xl leading-tight truncate pr-4 text-slate-800">${safeName}</h3>
                                    <span class="text-[10px] md:text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wider border ${getStatusColor(c.status)}">${escapeHTML(c.status)}</span>
                                </div>
                                
                                <div class="mt-3 text-sm text-gray-500 flex items-center font-medium">
                                    <svg class="w-4 h-4 mr-1.5 ${isSub ? 'text-[#007AFF]' : 'text-gray-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${escapeHTML(subText)} ${expAlert}
                                </div>

                                ${safeNotes ? `
                                <div onclick="openNotesModal('${c.id}')" class="mt-4 bg-gray-50/80 hover:bg-gray-100 rounded-xl p-3 text-sm text-gray-600 italic truncate cursor-pointer transition-colors border border-gray-100/50">
                                    "${safeNotes}"
                                </div>` : ''}
                            </div>

                            <div class="mt-5 pt-4 border-t border-gray-50 flex justify-end space-x-2">
                                <button onclick="deleteClient('${c.id}')" class="text-xs md:text-sm text-red-500 font-medium active:scale-95 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">Eliminar</button>
                                <button onclick="openClientModal('${c.id}')" class="text-xs md:text-sm text-[#007AFF] font-semibold active:scale-95 bg-blue-50 px-4 py-1.5 rounded-lg hover:bg-blue-100 transition-colors">Editar</button>
                            </div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', card);
                });
            }
        }

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            checkAuthState();
            
            document.getElementById('auth-password').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') handleAuth();
            });
        };

    </script>
</body>
</html>
